<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebPEER</title>
  </head>
  <body>
    <p><a href="https://github.com/nuzulul/webpeerjs">WebPEER</a> Basic Connection Demo | <a href="chat.html">chat</a></p>
	<div id="app"><ul id="myList"></ul></div>
	<script type="importmap">
	{
		"imports": {
			"webpeerjs" : "https://esm.sh/webpeerjs"
		}
	}
	</script>
	<script type="module">

			import { createWebPEER } from 'webpeerjs';
			
			function write(input){
				const node = document.createElement("li");
				const textnode = document.createTextNode(input);
				node.appendChild(textnode);
				document.getElementById("myList").appendChild(node);
			}
			
			const config = {
				appName : 'myAppHelloWorld'
			}			

			const peer = await createWebPEER(config);
			
			write(`My node id : ${peer.id}`);
			
			const roomname = 'globalroom';
			
			const room = peer.joinRoom(roomname);
			
			write(`joinRoom : ${roomname}`);
			
			room.onMessage((message,id) => {
				write(`Message from ${id} : ${message}`);
			})
			
			room.onMembersChange((data) => {
				write(`Members update : ${data}`);
				room.sendMessage('hello');
			})
			
	</script>
  </body>
</html>
